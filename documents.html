        <section class="block_form">
            <form onsubmit="alert('Заявка отправлена, свяжемся с вами в ближайшее время!'); return true;" class="block-text-form">
                <div class="block-text-form_2">

                </div>
                <input class="big-input" type="text" name="name" placeholder="Ваше ФИО" required>
                <input class="big-input" type="tel" id="phone" value="+7" onfocus="if(this.value==='') this.value='+7';" />
                <textarea class="big-input" name="message" placeholder="Ваше сообщение" rows="5" required></textarea>
                <button type="submit">Отправить</button>

                <script src="JS/form-contact.js"></script>
            </form>
        </section>
